name: Starters CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: [cli, server, web]
    env:
      DATABASE_URL: ./test.sqlite
    defaults:
      run:
        working-directory: starters/${{ matrix.template }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
      - name: Build (if script exists)
        run: |
          if jq -e '.scripts.build' package.json >/dev/null; then
            bun run build
          else
            echo "no build script, skipping"
          fi

  validate-fullstack:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starters/fullstack
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: starters/fullstack/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: starters/fullstack/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm lint:deps
      - run: pnpm test
      - run: pnpm build
